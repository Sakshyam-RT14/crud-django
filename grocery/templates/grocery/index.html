{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grocery Bud - Django</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="{% static 'grocery/css/global.css' %}" />
    <link rel="stylesheet" href="{% static 'grocery/css/form.css' %}" />
    <link rel="stylesheet" href="{% static 'grocery/css/single-item.css' %}" />
    <link rel="stylesheet" href="{% static 'grocery/css/items.css' %}" />
  </head>
  <body>
    <section class="section-center">
      <!-- Messages -->
      {% if messages %}
      <ul class="messages">
        {% for message in messages %}
        <li class="message {{ message.tags }}">{{ message }}</li>
        {% endfor %}
      </ul>
      {% endif %}

      <!-- Add / Edit Form -->
      <form
        class="item-form"
        method="post"
        action="{% if edit_item %}{% url 'grocery:update_item' edit_item.id %}{% else %}{% url 'grocery:add_item' %}{% endif %}"
      >
        {% csrf_token %}
        <input
          type="text"
          name="name"
          placeholder="e.g. eggs"
          value="{% if edit_item %}{{ edit_item.name }}{% endif %}"
          required
        />
        <button type="submit" class="btn submit-btn">
          {% if edit_item %}Update{% else %}Add{% endif %}
        </button>
      </form>

      <!-- Items List -->
      <div class="items">
        {% for item in items %}
        <div class="single-item">
          <form
            method="post"
            action="{% url 'grocery:toggle_completed' item.id %}"
          >
            {% csrf_token %}
            <input
              type="checkbox"
              onchange="this.form.submit()"
              {% if item.completed %}checked{% endif %}
            />
          </form>
          <p
            style="text-decoration: {% if item.completed %}line-through{% else %}none{% endif %}"
          >
            {{ item.name }}
          </p>
          <a
            href="{% url 'grocery:edit_item' item.id %}"
            class="btn icon-btn edit-btn"
          >
            <i class="fa-regular fa-pen-to-square"></i>
          </a>
          <form
            method="post"
            action="{% url 'grocery:delete_item' item.id %}"
            style="display: inline"
          >
            {% csrf_token %}
            <button class="btn icon-btn remove-btn" type="submit">
              <i class="fa-regular fa-trash-can"></i>
            </button>
          </form>
        </div>
        {% empty %}
        <p style="text-align: center; color: #888;">
          No items yet. Add one above!
        </p>
        {% endfor %}
      </div>
    </section>
  </body>
</html>
